name: 自動更新案件資料

on:
  schedule:
    # 每小時的第 0 分執行一次（UTC 時間，等於台灣時間每小時整點過後幾分鐘內執行）
    - cron: "0 * * * *"
  workflow_dispatch:
    # 允許在 GitHub 網頁上手動按「Run workflow」立即執行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo 內容
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 抓取並解析最新資料
        run: python scripts/build_data.py

      - name: 如果資料有變動就自動 commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "自動更新案件資料 [skip ci]"
          git push
