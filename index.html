<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程案件管理地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-font-smoothing: antialiased; }

  #app { display: flex; height: 100vh; }

  #sidebar { width: 300px; flex-shrink: 0; background: #fdfcfa; border-right: 1px solid #e8e4dc; display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 18px 18px 16px 18px; border-bottom: 1px solid #ece7dc; font-size: 17px; font-weight: 700; color: #2b2b28; letter-spacing: 0.3px; background: linear-gradient(180deg, #fffdf9 0%, #fdfcfa 100%); }
  #sidebar-header .count { font-size: 12px; color: #888; font-weight: 400; margin-top: 2px; }
  #sidebar-header .updated { font-size: 11px; color: #aaa; font-weight: 400; margin-top: 2px; }

  #layer-list { overflow-y: auto; flex: 1; }
  #unlocated-section { border-top: 2px solid #f0f0f0; }
  #unlocated-section .layer-group-title { background: #fff8e1; }

  .layer-group { border-bottom: 1px solid #f0f0f0; }
  .layer-group-title { display: flex; align-items: center; gap: 8px; padding: 11px 18px; cursor: pointer; font-size: 13.5px; font-weight: 600; color: #4a4740; background: #f7f4ee; letter-spacing: 0.2px; }
  .layer-group-title:hover { background: #f0f0f0; }
  .layer-group-title .swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .layer-group-title .cnt { margin-left: auto; color: #999; font-weight: 400; font-size: 12px; }

  .case-item { padding: 9px 18px 9px 36px; font-size: 13px; color: #4a4740; cursor: pointer; border-bottom: 1px solid #f5f2ec; line-height: 1.55; }
  .case-item:hover { background: #f5f0e6; }
  .case-item.active { background: #ede2cd; font-weight: 600; }
  .case-item .overdue-tag { color: #d9534f; font-size: 11px; margin-left: 4px; }
  .case-item .reported-tag { color: #1e7e34; font-size: 11px; margin-left: 4px; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  .leaflet-popup-content-wrapper { background: #ffffff; border-radius: 12px; box-shadow: 0 8px 28px rgba(60,50,30,0.18); padding: 0; }
  .leaflet-popup-content { margin: 0; width: 290px !important; }
  .leaflet-popup-tip { background: #ffffff; }

  .card-header { padding: 12px 34px 8px 14px; font-size: 14px; font-weight: 600; line-height: 1.5; color: #2b2b28; }

  .card-photo-wrap { position: relative; width: 100%; height: 150px; background: #111; overflow: hidden; }
  .card-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-photo-empty { width: 100%; height: 150px; background: #eee; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 12px; }
  .photo-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 14px; }
  .photo-nav.prev { left: 6px; } .photo-nav.next { right: 6px; }
  .photo-count { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; }

  .card-info { padding: 11px 14px; font-size: 12.5px; color: #4a4740; }
  .card-info .row { display: flex; margin-bottom: 5px; }
  .card-info .label { width: 62px; flex-shrink: 0; color: #888; }
  .card-info .value { flex: 1; word-break: break-all; }
  .card-info .value.overdue { color: #d9534f; font-weight: 700; }
  .card-info .value.empty { color: #bbb; }

  .card-report-area { padding: 4px 12px 12px 12px; }
  .report-btn { width: 100%; padding: 9px; border: none; border-radius: 6px; background: #F09300; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  .report-btn:hover { background: #d97f00; }
  .report-done { width: 100%; padding: 9px; border-radius: 6px; background: #e6f4ea; color: #1e7e34; font-size: 13px; font-weight: 600; text-align: center; }

  .card-coords { font-size: 10.5px; color: #aaa; padding: 0 12px 10px 12px; }

  #sidebar-toggle { display: none; position: absolute; top: 10px; left: 10px; z-index: 1000; background: #fff; border: 1px solid #ccc; border-radius: 6px; width: 38px; height: 38px; font-size: 18px; cursor: pointer; }
  @media (max-width: 720px) {
    #sidebar { position: absolute; z-index: 999; height: 100%; transform: translateX(-100%); transition: transform .2s; box-shadow: 4px 0 12px rgba(0,0,0,0.2); }
    #sidebar.open { transform: translateX(0); }
    #sidebar-toggle { display: block; }
  }
</style>

        <strong style="font-size:14px;">路線規劃</strong>

<!-- 圖片放大燈箱 -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKsEWAsOEibsBy9JTM6jDluTZPa0mR7CE",
  authDomain: "work-map-1cec7.firebaseapp.com",
  projectId: "work-map-1cec7",
  storageBucket: "work-map-1cec7.firebasestorage.app",
  messagingSenderId: "406421110375",
  appId: "1:406421110375:web:f4c44788847f792aee5ec2"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const LAYER_COLORS = {
  "催辦案件": "#4285F4",
  "危險案件": "#DB4436",
  "近期狂催且有危險案件": "#FDD835",
  "逾期案件": "#F09300"
};
const LAYER_LABELS = {
  "催辦案件": "催",
  "危險案件": "危",
  "近期狂催且有危險案件": "超急",
  "逾期案件": "逾"
};
const LAYER_TEXT_COLORS = {
  "近期狂催且有危險案件": "#D32F2F"
};

// 側邊欄分類顯示順序（由上到下），要調整順序改這裡就好
const LAYER_ORDER = ["近期狂催且有危險案件", "危險案件", "催辦案件", "逾期案件"];

const CASETYPE_COLORS = {
  "評估案件": "#1a73e8",
  "搶修案件": "#c5221f"
};
const CASETYPE_LABELS = {
  "評估案件": "評",
  "搶修案件": "搶"
};

const map = L.map('map', { zoomControl: false }).setView([24.1435, 120.6480], 13);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

// ---------- 使用者目前位置 ----------
let userLocation = null;
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (pos) => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
    (err) => { console.warn('無法取得目前位置：', err.message); },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ---------- 路線計算（OSRM，免費、不需金鑰） ----------
async function osrmRoute(coordsLatLng) {
  // coordsLatLng: [{lat,lng}, ...]（至少 2 點）
  const coordStr = coordsLatLng.map(c => `${c.lng},${c.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=false`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('路線計算失敗');
  return data.routes[0]; // { distance(m), duration(s), legs: [...] }
}

function formatDistance(meters) {
  return meters >= 1000 ? `${(meters / 1000).toFixed(1)} 公里` : `${Math.round(meters)} 公尺`;
}
function formatDuration(seconds) {
  const min = Math.round(seconds / 60);
  return min >= 60 ? `${Math.floor(min / 60)} 小時 ${min % 60} 分鐘` : `${min} 分鐘`;
}

function googleMapsDirectionUrl(origin, destination, waypoints) {
  const base = 'https://www.google.com/maps/dir/?api=1';
  const originStr = origin ? `&origin=${origin.lat},${origin.lng}` : '';
  const destStr = `&destination=${destination.lat},${destination.lng}`;
  const wpStr = waypoints && waypoints.length > 0
    ? `&waypoints=${waypoints.map(w => `${w.lat},${w.lng}`).join('|')}`
    : '';
  return `${base}${originStr}${destStr}${wpStr}&travelmode=driving`;
}

// ---------- 路線規劃清單 ----------
let routeStops = []; // [{id, title, lat, lng}]

function showRouteToast(message) {
  const toast = document.getElementById('routeToast');
  toast.textContent = message;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(showRouteToast._t);
  showRouteToast._t = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(-20px)';
  }, 2200);
}

function toggleRouteStop(id) {
  try {
    console.log('[路線規劃] 按鈕被點擊，id =', id);
    const idx = routeStops.findIndex(s => s.id === id);
    if (idx >= 0) {
      routeStops.splice(idx, 1);
      console.log('[路線規劃] 已從路線移除');
      showRouteToast('已從路線移除');
    } else {
      const marker = markerById[id];
      console.log('[路線規劃] 找到的 marker：', marker);
      const item = marker ? marker.caseItem : null;
      if (!item) {
        console.warn('[路線規劃] 找不到對應的案件資料，id =', id);
        alert('發生問題：找不到這筆案件的資料，請截圖 Console 內容給開發者看。');
        return;
      }
      routeStops.push({ id, title: item.title, lat: item.lat, lng: item.lng });
      console.log('[路線規劃] 已加入路線，目前路線：', routeStops);
      showRouteToast('✅ 已加入路線規劃（上方查看）');
    }
    updateRouteFab();
    renderRoutePanel();
    if (markerById[id]) markerById[id].openPopup();
  } catch (err) {
    console.error('[路線規劃] 發生錯誤：', err);
    alert('加入路線發生錯誤：' + err.message);
  }
}
window.toggleRouteStop = toggleRouteStop;

function updateRouteFab() {
  const fab = document.getElementById('routeFab');
  document.getElementById('routeCount').textContent = routeStops.length;
  fab.style.display = routeStops.length > 0 ? 'block' : 'none';
}

document.getElementById('routeFab').addEventListener('click', () => {
  document.getElementById('routePanel').style.display = 'block';
  document.getElementById('routeFab').style.display = 'none';
  renderRoutePanel();
});
document.getElementById('closeRoutePanel').addEventListener('click', () => {
  document.getElementById('routePanel').style.display = 'none';
  updateRouteFab();
});
document.getElementById('clearRoute').addEventListener('click', () => {
  routeStops = [];
  document.getElementById('routePanel').style.display = 'none';
  updateRouteFab();
});
document.getElementById('openGoogleRoute').addEventListener('click', () => {
  if (routeStops.length === 0) return;
  const origin = userLocation || routeStops[0];
  const stopsForNav = userLocation ? routeStops : routeStops.slice(1);
  const destination = stopsForNav[stopsForNav.length - 1] || routeStops[0];
  const waypoints = stopsForNav.slice(0, -1);
  window.open(googleMapsDirectionUrl(origin, destination, waypoints), '_blank');
});

async function renderRoutePanel() {
  const stopsEl = document.getElementById('routeStops');
  const summaryEl = document.getElementById('routeSummary');
  stopsEl.innerHTML = '';

  if (routeStops.length === 0) {
    stopsEl.innerHTML = '<div style="color:#999;font-size:13px;">尚未選擇任何站點，點案件卡片裡的「加入路線」按鈕開始規劃。</div>';
    summaryEl.textContent = '';
    return;
  }

  const points = userLocation ? [userLocation, ...routeStops] : routeStops;
  points.forEach((p, idx) => {
    const div = document.createElement('div');
    div.style.padding = '6px 0';
    div.style.borderBottom = idx < points.length - 1 ? '1px dashed #eee' : 'none';
    div.style.fontSize = '13px';
    const label = idx === 0 && userLocation ? '📍 你目前的位置' : (p.title || `站點 ${idx}`);
    div.innerHTML = `<strong>${idx + 1}.</strong> ${label}` +
      (p.id ? ` <button data-rm="${p.id}" style="float:right;border:none;background:none;color:#d9534f;cursor:pointer;font-size:12px;">移除</button>` : '');
    stopsEl.appendChild(div);
  });
  stopsEl.querySelectorAll('[data-rm]').forEach(btn => {
    btn.addEventListener('click', () => toggleRouteStop(btn.getAttribute('data-rm')));
  });

  summaryEl.textContent = '路線計算中...';
  try {
    if (points.length < 2) {
      summaryEl.textContent = '至少需要 2 個點才能計算路線（目前位置無法取得時，需再加入至少 2 個站點）。';
      return;
    }
    const route = await osrmRoute(points);
    summaryEl.innerHTML = `總距離約 <strong>${formatDistance(route.distance)}</strong>，預估車程 <strong>${formatDuration(route.duration)}</strong>`;
  } catch (e) {
    summaryEl.textContent = '路線計算暫時失敗，可直接按下方按鈕用 Google 地圖規劃。';
  }
}

function makeIcon(color, label, textColor) {
  const fontSize = label.length > 1 ? 10 : 13;
  return L.divIcon({
    className: '',
    html: `<div style="width:26px;height:26px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;color:${textColor || '#fff'};font-weight:700;font-size:${fontSize}px;">${label}</div>`,
    iconSize: [26, 26], iconAnchor: [13, 13], popupAnchor: [0, -13]
  });
}

function fieldRow(label, value, isOverdue) {
  const cls = isOverdue ? 'overdue' : (value ? '' : 'empty');
  return `<div class="row"><div class="label">${label}</div><div class="value ${cls}">${value || '沒有值'}</div></div>`;
}

window.reportConstruction = async function(id) {
  if (!confirm('確定要通報施工嗎？')) return;
  try {
    await updateDoc(doc(db, 'cases', id), {
      constructionReported: true,
      reportedAt: serverTimestamp()
    });
  } catch (e) {
    alert('通報失敗：' + e.message);
  }
};

window.cancelReport = async function(id) {
  if (!confirm('確定要取消這筆通報嗎？')) return;
  try {
    await updateDoc(doc(db, 'cases', id), {
      constructionReported: false,
      reportedAt: null
    });
  } catch (e) {
    alert('取消失敗：' + e.message);
  }
};

function popupHtml(item) {
  const overdueDays = parseFloat(item.overdueDays) || 0;
  let photoHtml;
  if (item.photos && item.photos.length > 0) {
    const pid = 'ph_' + item.id;
    window._photoRegistry = window._photoRegistry || {};
    window._photoRegistry[pid] = item.photos;
    photoHtml = `
      <div class="card-photo-wrap" id="${pid}">
        <img src="${item.photos[0]}" data-idx="0" referrerpolicy="no-referrer" style="cursor:pointer;" onclick="openLightbox('${pid}')" onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('afterbegin','<div class=\\'card-photo-empty\\'>圖片暫時無法顯示</div>')">
        ${item.photos.length > 1 ? `
          <button class="photo-nav prev" onclick="event.stopPropagation();changePhoto('${pid}', ${JSON.stringify(item.photos).replace(/"/g,'&quot;')}, -1)">‹</button>
          <button class="photo-nav next" onclick="event.stopPropagation();changePhoto('${pid}', ${JSON.stringify(item.photos).replace(/"/g,'&quot;')}, 1)">›</button>
          <div class="photo-count">1 / ${item.photos.length}</div>
        ` : ''}
      </div>`;
  } else {
    photoHtml = `<div class="card-photo-empty">無照片</div>`;
  }

  const reportArea = item.constructionReported
    ? `<div class="card-report-area"><button class="report-btn" style="background:#5f6368;" onclick="cancelReport('${item.id}')">✓ 已通報施工（點此取消）</button></div>`
    : `<div class="card-report-area"><button class="report-btn" onclick="reportConstruction('${item.id}')">通報施工</button></div>`;

  const inRoute = routeStops.some(s => s.id === item.id);
  const navArea = `
    <div class="nav-area" style="padding:8px 12px;border-top:1px solid #f0f0f0;">
      <div id="navinfo_${item.id}" style="font-size:12px;color:#666;margin-bottom:8px;">距離計算中...</div>
      <div style="display:flex;gap:6px;">
        <button onclick="window.open('${googleMapsDirectionUrl(null, {lat:item.lat,lng:item.lng})}','_blank')" style="flex:1;padding:8px;border:none;border-radius:6px;background:#34a853;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">🧭 開始導航</button>
        <button onclick="toggleRouteStop('${item.id}')" style="flex:1;padding:8px;border:none;border-radius:6px;background:${inRoute ? '#e6f4ea' : '#f0f0f0'};color:${inRoute ? '#1e7e34' : '#555'};font-size:12px;font-weight:600;cursor:pointer;">${inRoute ? '✓ 已加入路線' : '➕ 加入路線'}</button>
      </div>
    </div>`;

  const isDone = !!(item.completedDate && item.completedDate.trim());
  return `
    <div class="card-header" style="${isDone ? 'text-decoration:line-through;color:#aaa;' : ''}">${item.title}${isDone ? ' <span style="text-decoration:none;color:#1e7e34;font-size:11px;">✓ 已完成</span>' : ''}</div>
    ${photoHtml}
    <div class="card-info">
      ${fieldRow('位置', item.location)}
      ${fieldRow('建議人', item.suggester)}
      ${fieldRow('完成日期', item.completedDate)}
      ${fieldRow('逾期天數', item.overdueDays ? Math.round(overdueDays) : '', overdueDays > 0)}
      ${fieldRow('狀態', item.status)}
    </div>
    ${reportArea}
    ${navArea}
    <div class="card-coords">📍 ${item.lat.toFixed(5)}, ${item.lng.toFixed(5)}</div>
  `;
}

async function fillNavInfo(item) {
  const el = document.getElementById(`navinfo_${item.id}`);
  if (!el) return;
  if (!userLocation) {
    el.textContent = '（無法取得你目前位置，僅能使用導航按鈕）';
    return;
  }
  try {
    const route = await osrmRoute([userLocation, { lat: item.lat, lng: item.lng }]);
    el.innerHTML = `距離你目前位置約 <strong>${formatDistance(route.distance)}</strong>，車程約 <strong>${formatDuration(route.duration)}</strong>`;
  } catch (e) {
    el.textContent = '距離計算暫時失敗（可直接按導航按鈕）';
  }
}

window.changePhoto = function(wrapId, photos, dir) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const img = wrap.querySelector('img');
  let idx = parseInt(img.getAttribute('data-idx')) || 0;
  idx = (idx + dir + photos.length) % photos.length;
  img.setAttribute('data-idx', idx);
  img.src = photos[idx];
  const countEl = wrap.querySelector('.photo-count');
  if (countEl) countEl.textContent = `${idx + 1} / ${photos.length}`;
};

// ---------- 圖片放大燈箱 ----------
let lightboxState = { photos: [], idx: 0 };

window.openLightbox = function(pid) {
  const photos = (window._photoRegistry && window._photoRegistry[pid]) || [];
  if (photos.length === 0) return;
  const wrap = document.getElementById(pid);
  const img = wrap ? wrap.querySelector('img') : null;
  const idx = img ? (parseInt(img.getAttribute('data-idx')) || 0) : 0;
  lightboxState = { photos, idx };
  updateLightboxImage();
  document.getElementById('lightbox').style.display = 'flex';
};

function updateLightboxImage() {
  const { photos, idx } = lightboxState;
  document.getElementById('lightboxImg').src = photos[idx];
  document.getElementById('lightboxCount').textContent = `${idx + 1} / ${photos.length}`;
  const showNav = photos.length > 1;
  document.getElementById('lightboxPrev').style.display = showNav ? 'block' : 'none';
  document.getElementById('lightboxNext').style.display = showNav ? 'block' : 'none';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') closeLightbox();
});
document.getElementById('lightboxPrev').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxState.idx = (lightboxState.idx - 1 + lightboxState.photos.length) % lightboxState.photos.length;
  updateLightboxImage();
});
document.getElementById('lightboxNext').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxState.idx = (lightboxState.idx + 1) % lightboxState.photos.length;
  updateLightboxImage();
});
document.addEventListener('keydown', (e) => {
  if (document.getElementById('lightbox').style.display !== 'flex') return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') document.getElementById('lightboxPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('lightboxNext').click();
});

function contractFieldRow(label, value) {
  return `<div class="row"><div class="label">${label}</div><div class="value ${value ? '' : 'empty'}">${value || '沒有值'}</div></div>`;
}

function contractPopupHtml(item) {
  let photoHtml;
  if (item.photos && item.photos.length > 0) {
    const pid = 'cph_' + item.id;
    window._photoRegistry = window._photoRegistry || {};
    window._photoRegistry[pid] = item.photos;
    photoHtml = `
      <div class="card-photo-wrap" id="${pid}">
        <img src="${item.photos[0]}" data-idx="0" referrerpolicy="no-referrer" style="cursor:pointer;" onclick="openLightbox('${pid}')" onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('afterbegin','<div class=\\'card-photo-empty\\'>圖片暫時無法顯示</div>')">
        ${item.photos.length > 1 ? `
          <button class="photo-nav prev" onclick="event.stopPropagation();changePhoto('${pid}', ${JSON.stringify(item.photos).replace(/"/g,'&quot;')}, -1)">‹</button>
          <button class="photo-nav next" onclick="event.stopPropagation();changePhoto('${pid}', ${JSON.stringify(item.photos).replace(/"/g,'&quot;')}, 1)">›</button>
          <div class="photo-count">1 / ${item.photos.length}</div>
        ` : ''}
      </div>`;
  } else {
    photoHtml = `<div class="card-photo-empty">無照片</div>`;
  }

  const inRoute = routeStops.some(s => s.id === item.id);
  const navArea = `
    <div class="nav-area" style="padding:8px 12px;border-top:1px solid #f0f0f0;">
      <div id="navinfo_${item.id}" style="font-size:12px;color:#666;margin-bottom:8px;">距離計算中...</div>
      <div style="display:flex;gap:6px;">
        <button onclick="window.open('${googleMapsDirectionUrl(null, {lat:item.lat,lng:item.lng})}','_blank')" style="flex:1;padding:8px;border:none;border-radius:6px;background:#34a853;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">🧭 開始導航</button>
        <button onclick="toggleRouteStop('${item.id}')" style="flex:1;padding:8px;border:none;border-radius:6px;background:${inRoute ? '#e6f4ea' : '#f0f0f0'};color:${inRoute ? '#1e7e34' : '#555'};font-size:12px;font-weight:600;cursor:pointer;">${inRoute ? '✓ 已加入路線' : '➕ 加入路線'}</button>
      </div>
    </div>`;

  return `
    <div class="card-header">${item.title}</div>
    ${photoHtml}
    <div class="card-info">
      ${contractFieldRow('標案名稱', item.contractName)}
      ${contractFieldRow('廠商', item.vendor)}
      ${contractFieldRow('案件性質', item.caseType)}
      ${contractFieldRow('位置', item.location)}
      ${contractFieldRow('狀態', item.status)}
    </div>
    ${navArea}
    <div class="card-coords">📍 ${item.lat.toFixed(5)}, ${item.lng.toFixed(5)}</div>
  `;
}

let markersByLayer = {};
let markerById = {};
let currentMode = 'road';
let roadCasesCache = [];
let contractCasesCache = [];

function clearMap() {
  Object.values(markersByLayer).forEach(g => map.removeLayer(g));
  markersByLayer = {};
  markerById = {};
}

function renderRoad(cases) {
  clearMap();
  document.getElementById('layer-list').innerHTML = '';

  const keyword = (document.getElementById('mapSearchBox').value || '').trim().toLowerCase();
  if (keyword) {
    cases = cases.filter(c =>
      (c.title || '').toLowerCase().includes(keyword) ||
      (c.location || '').toLowerCase().includes(keyword)
    );
  }

  const located = cases.filter(c => c.lat != null && c.lng != null);
  const unlocated = cases.filter(c => c.lat == null || c.lng == null);

  document.getElementById('total-count').textContent = keyword
    ? `搜尋「${document.getElementById('mapSearchBox').value.trim()}」找到 ${cases.length} 筆`
    : `共 ${cases.length} 筆案件（${unlocated.length} 筆未定位）`;

  located.forEach(item => {
    const color = LAYER_COLORS[item.layer] || '#666';
    const label = LAYER_LABELS[item.layer] || '?';
    const textColor = LAYER_TEXT_COLORS[item.layer];
    const marker = L.marker([item.lat, item.lng], { icon: makeIcon(color, label, textColor) });
    marker.bindPopup(() => popupHtml(item), { maxWidth: 310, closeButton: true, autoPan: true });
    marker.on('mouseover', () => marker.openPopup());
    marker.on('click', () => marker.openPopup());

    if (!markersByLayer[item.layer]) markersByLayer[item.layer] = L.layerGroup();
    marker.caseItem = item;
    marker.addTo(markersByLayer[item.layer]);
    markerById[item.id] = marker;
  });
  Object.values(markersByLayer).forEach(g => g.addTo(map));

  const layerListEl = document.getElementById('layer-list');
  const groups = {};
  located.forEach(item => { (groups[item.layer] = groups[item.layer] || []).push(item); });

  const sortedGroups = Object.entries(groups).sort((a, b) => {
    const ai = LAYER_ORDER.indexOf(a[0]);
    const bi = LAYER_ORDER.indexOf(b[0]);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  sortedGroups.forEach(([layerName, items]) => {
    const color = LAYER_COLORS[layerName] || '#666';
    const groupEl = document.createElement('div');
    groupEl.className = 'layer-group';
    const titleEl = document.createElement('div');
    titleEl.className = 'layer-group-title';
    titleEl.innerHTML = `
      <input type="checkbox" checked>
      <span class="swatch" style="background:${color}"></span>
      <span>${layerName}</span>
      <span class="cnt">${items.length}</span>
    `;
    groupEl.appendChild(titleEl);

    const listWrap = document.createElement('div');
    items.forEach((item, idx) => {
      const overdueDays = parseFloat(item.overdueDays) || 0;
      const isDone = !!(item.completedDate && item.completedDate.trim());
      const el = document.createElement('div');
      el.className = 'case-item';
      if (isDone) {
        el.style.color = '#aaa';
        el.style.textDecoration = 'line-through';
      }
      el.innerHTML = `<span style="color:#999;margin-right:4px;">${idx + 1}.</span>${item.title}${!isDone && overdueDays > 0 ? `<span class="overdue-tag">逾期${Math.round(overdueDays)}天</span>` : ''}${isDone ? `<span style="text-decoration:none;color:#1e7e34;font-size:11px;margin-left:4px;">✓ 已完成</span>` : ''}${!isDone && item.constructionReported ? `<span class="reported-tag">已通報</span>` : ''}`;
      el.addEventListener('click', () => {
        document.querySelectorAll('.case-item.active').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        map.setView([item.lat, item.lng], 17, { animate: true });
        markerById[item.id].openPopup();
        if (window.innerWidth <= 720) document.getElementById('sidebar').classList.remove('open');
      });
      listWrap.appendChild(el);
    });
    groupEl.appendChild(listWrap);

    titleEl.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) { map.addLayer(markersByLayer[layerName]); listWrap.style.display = ''; }
      else { map.removeLayer(markersByLayer[layerName]); listWrap.style.display = 'none'; }
    });
    titleEl.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return;
      listWrap.style.display = listWrap.style.display === 'none' ? '' : 'none';
    });

    layerListEl.appendChild(groupEl);
  });

  if (unlocated.length > 0) {
    const sec = document.createElement('div');
    sec.id = 'unlocated-section';
    sec.innerHTML = `<div class="layer-group-title"><span>⚠️ 尚未定位的案件</span><span class="cnt">${unlocated.length}</span></div>`;
    const listWrap = document.createElement('div');
    unlocated.forEach(item => {
      const el = document.createElement('div');
      el.className = 'case-item';
      el.style.cursor = 'default';
      el.innerHTML = `${item.title || '（未命名）'}<span style="color:#aaa;font-size:11px;margin-left:4px;">未定位</span>`;
      listWrap.appendChild(el);
    });
    sec.appendChild(listWrap);
    layerListEl.appendChild(sec);
  }
}

function renderContract(cases) {
  clearMap();
  document.getElementById('layer-list').innerHTML = '';

  const keyword = (document.getElementById('mapSearchBox').value || '').trim().toLowerCase();
  if (keyword) {
    cases = cases.filter(c =>
      (c.title || '').toLowerCase().includes(keyword) ||
      (c.location || '').toLowerCase().includes(keyword) ||
      (c.vendor || '').toLowerCase().includes(keyword) ||
      (c.contractName || '').toLowerCase().includes(keyword)
    );
  }

  const located = cases.filter(c => c.lat != null && c.lng != null);
  const unlocated = cases.filter(c => c.lat == null || c.lng == null);

  document.getElementById('total-count').textContent = keyword
    ? `搜尋「${document.getElementById('mapSearchBox').value.trim()}」找到 ${cases.length} 筆`
    : `共 ${cases.length} 筆標案案件（${unlocated.length} 筆未定位）`;

  located.forEach(item => {
    const color = CASETYPE_COLORS[item.caseType] || '#666';
    const label = CASETYPE_LABELS[item.caseType] || '?';
    const marker = L.marker([item.lat, item.lng], { icon: makeIcon(color, label) });
    marker.bindPopup(() => contractPopupHtml(item), { maxWidth: 310, closeButton: true, autoPan: true });
    marker.on('mouseover', () => marker.openPopup());
    marker.on('click', () => marker.openPopup());

    const groupKey = item.vendor || '未指定廠商';
    if (!markersByLayer[groupKey]) markersByLayer[groupKey] = L.layerGroup();
    marker.caseItem = item;
    marker.addTo(markersByLayer[groupKey]);
    markerById[item.id] = marker;
  });
  Object.values(markersByLayer).forEach(g => g.addTo(map));

  const layerListEl = document.getElementById('layer-list');
  // 分組：廠商 -> 標案 -> 案件性質清單
  const byVendor = {};
  located.forEach(item => {
    const vendor = item.vendor || '未指定廠商';
    const contractName = item.contractName || '未分類標案';
    byVendor[vendor] = byVendor[vendor] || {};
    byVendor[vendor][contractName] = byVendor[vendor][contractName] || [];
    byVendor[vendor][contractName].push(item);
  });

  Object.entries(byVendor).forEach(([vendor, contracts]) => {
    const vendorCount = Object.values(contracts).reduce((sum, arr) => sum + arr.length, 0);
    const vendorEl = document.createElement('div');
    vendorEl.className = 'layer-group';
    const vendorTitle = document.createElement('div');
    vendorTitle.className = 'layer-group-title';
    vendorTitle.innerHTML = `<span>🏢 ${vendor}</span><span class="cnt">${vendorCount}</span>`;
    vendorEl.appendChild(vendorTitle);

    const vendorWrap = document.createElement('div');
    Object.entries(contracts).forEach(([contractName, items]) => {
      const contractTitle = document.createElement('div');
      contractTitle.style.padding = '6px 16px 6px 28px';
      contractTitle.style.fontSize = '12.5px';
      contractTitle.style.fontWeight = '600';
      contractTitle.style.color = '#555';
      contractTitle.style.background = '#f5f5f5';
      contractTitle.textContent = `📄 ${contractName}（${items.length}）`;
      vendorWrap.appendChild(contractTitle);

      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'case-item';
        el.style.paddingLeft = '40px';
        const typeColor = CASETYPE_COLORS[item.caseType] || '#666';
        el.innerHTML = `<span style="color:#999;margin-right:4px;">${idx + 1}.</span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${typeColor};margin-right:5px;"></span>${item.title}<span style="color:#999;font-size:11px;margin-left:4px;">${item.caseType || ''}</span>`;
        el.addEventListener('click', () => {
          document.querySelectorAll('.case-item.active').forEach(n => n.classList.remove('active'));
          el.classList.add('active');
          map.setView([item.lat, item.lng], 17, { animate: true });
          markerById[item.id].openPopup();
          if (window.innerWidth <= 720) document.getElementById('sidebar').classList.remove('open');
        });
        vendorWrap.appendChild(el);
      });
    });
    vendorEl.appendChild(vendorWrap);

    vendorTitle.addEventListener('click', () => {
      vendorWrap.style.display = vendorWrap.style.display === 'none' ? '' : 'none';
    });

    layerListEl.appendChild(vendorEl);
  });

  if (unlocated.length > 0) {
    const sec = document.createElement('div');
    sec.id = 'unlocated-section';
    sec.innerHTML = `<div class="layer-group-title"><span>⚠️ 尚未定位的案件</span><span class="cnt">${unlocated.length}</span></div>`;
    const listWrap = document.createElement('div');
    unlocated.forEach(item => {
      const el = document.createElement('div');
      el.className = 'case-item';
      el.style.cursor = 'default';
      el.innerHTML = `${item.title || '（未命名）'}<span style="color:#aaa;font-size:11px;margin-left:4px;">未定位</span>`;
      listWrap.appendChild(el);
    });
    sec.appendChild(listWrap);
    layerListEl.appendChild(sec);
  }
}

function renderCurrent() {
  if (currentMode === 'road') {
    document.getElementById('sidebar-header').firstChild.textContent = '搶修案件管理地圖';
    renderRoad(roadCasesCache);
  } else {
    document.getElementById('sidebar-header').firstChild.textContent = '評估案件管理地圖';
    renderContract(contractCasesCache);
  }
}

document.getElementById('mapSearchBox').addEventListener('input', renderCurrent);

document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentMode = btn.getAttribute('data-mode');
    document.getElementById('mapSearchBox').value = '';
    document.querySelectorAll('.mode-tab').forEach(b => {
      const active = b === btn;
      b.style.background = active ? '#fff' : '#fafafa';
      b.style.borderBottom = active ? '2px solid #4285F4' : '2px solid transparent';
      b.style.color = active ? '#222' : '#888';
    });
    renderCurrent();
  });
});

map.on('popupopen', (e) => {
  const marker = e.popup._source;
  if (marker && marker.caseItem) {
    fillNavInfo(marker.caseItem);
  }
});

onSnapshot(collection(db, 'cases'), (snapshot) => {
  roadCasesCache = [];
  snapshot.forEach(d => roadCasesCache.push({ id: d.id, ...d.data() }));
  if (currentMode === 'road') renderCurrent();
});

onSnapshot(collection(db, 'contract_cases'), (snapshot) => {
  contractCasesCache = [];
  snapshot.forEach(d => contractCasesCache.push({ id: d.id, ...d.data() }));
  if (currentMode === 'contract') renderCurrent();
});

document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});
</script>
